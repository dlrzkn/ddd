<div id="map"></div>
<link href="https://api.mapbox.com/mapbox-gl-js/v2.21.0/mapbox-gl.css" rel="stylesheet" />
<script src="https://api.mapbox.com/mapbox-gl-js/v2.21.0/mapbox-gl.js"></script>
<script>
mapboxgl.accessToken = 'pk.eyJ1IjoiZGxyemtuIiwiYSI6ImNtbWV3emgzeTAyNnIyc3NvajQyeTJvd3cifQ.nL1bP70pD5WWJiycG6jtHw';

const map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/mapbox/light-v11',
  center: [35, 39],
  zoom: 5
});

map.on('load', () => {
  map.addLayer({
    id: 'test-point',
    type: 'circle',
    source: {
      type: 'geojson',
      data: {
        type: 'FeatureCollection',
        features: [{
          type: 'Feature',
          geometry: { type: 'Point', coordinates: [35, 39] },
          properties: { title: 'Test Deprem' }
        }]
      }
    },
    paint: { 'circle-radius': 10, 'circle-color': '#f00' }
  });
});
</script>
