<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Türkiye Deprem Haritası</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html, body{
margin:0;
padding:0;
height:100%;
}

#map{
width:100%;
height:100%;
}
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([39,35],6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);


/* büyüklüğe göre renk */

function getColor(mag){

return mag > 5 ? "red" :
mag > 4 ? "orange" :
mag > 3 ? "yellow" :
"green";

}


/* deprem verisi */

fetch("https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_day.geojson")

.then(response => response.json())

.then(data => {

data.features.forEach(eq => {

var coords = eq.geometry.coordinates;
var mag = eq.properties.mag;
var place = eq.properties.place;

/* Türkiye filtresi */

if(coords[1] > 35 && coords[1] < 43 &&
coords[0] > 25 && coords[0] < 46){

L.circleMarker([coords[1],coords[0]],{

radius: mag * 3,
color: getColor(mag),
fillOpacity:0.8

})
.addTo(map)
.bindPopup(
"Büyüklük: "+mag+"<br>"+place
);

}

});

});

</script>

</body>
</html>
