<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Deprem Haritası</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html, body{
margin:0;
padding:0;
height:100%;
}

#map{
width:100%;
height:100%;
}

button{
position:absolute;
top:10px;
left:10px;
z-index:1000;
padding:8px 12px;
background:white;
border:1px solid gray;
cursor:pointer;
}
</style>
</head>

<body>

<button onclick="turkiye()">Türkiye'ye Git</button>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([39,35],6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

var depremLayer = L.layerGroup().addTo(map);



function getColor(mag){

if(mag >= 6) return "#ff0000";
if(mag >= 5) return "#ff6600";
if(mag >= 4) return "#ffcc00";
if(mag >= 3) return "#ffff66";

return "#66ff66";

}



fetch("https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_day.geojson")
.then(response => response.json())
.then(data => {

data.features.forEach(eq => {

var coords = eq.geometry.coordinates;
var mag = eq.properties.mag;
var place = eq.properties.place;

if(mag == null) return;

L.circleMarker([coords[1],coords[0]],{

radius: mag * 3,
color:getColor(mag),
fillColor:getColor(mag),
fillOpacity:0.8,
weight:1

})
.addTo(depremLayer)
.bindPopup(
"<b>Deprem</b><br>"+
"Büyüklük: "+mag+"<br>"+
"Yer: "+place
);

});

});



function turkiye(){

map.setView([39,35],6);

}



var baseMaps = {
"Harita": map
};

var overlayMaps = {
"Depremler": depremLayer
};

L.control.layers(null, overlayMaps).addTo(map);

</script>

</body>
</html>
