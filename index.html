<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Deprem Haritası</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>

<style>
html, body { margin:0; padding:0; height:100%; }
#map { width:100%; height:100%; }
</style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>
// 1️⃣ Harita oluştur
var map = L.map('map').setView([39,35],5);

// OpenStreetMap tabanı
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    maxZoom:19
}).addTo(map);

// 2️⃣ Layer grupları
var globalCluster = L.markerClusterGroup();
var turkeyCluster = L.markerClusterGroup();
var fayLayer = L.geoJSON(null, { style: { color: 'orange', weight: 2 } });

// 3️⃣ Layer kontrolü
var overlayMaps = {
  "Dünya Depremleri": globalCluster,
  "Türkiye Depremleri": turkeyCluster,
  "Fay Hatları": fayLayer
};
L.control.layers(null, overlayMaps, { collapsed: false }).addTo(map);

// 4️⃣ Dünya depremleri (USGS)
fetch("https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_day.geojson")
.then(res => res.json())
.then(data => {
    data.features.forEach(eq => {
        var coords = eq.geometry.coordinates;
        var mag = eq.properties.mag;
        var place = eq.properties.place;
        var marker = L.circleMarker([coords[1], coords[0]],{
            radius: mag*2,
            color: "red",
            fillOpacity: 0.6
        }).bindPopup(`<b>${place}</b><br>Magnitude: ${mag}`);
        globalCluster.addLayer(marker);
    });
    globalCluster.addTo(map);
});

// 5️⃣ Türkiye depremleri (Örnek: repodaki JSON)
fetch("https://dlrzkn.github.io/deprem-takip/turkiye_canli_depremler.geojson")
.then(res => res.json())
.then(data => {
    data.features.forEach(eq => {
        var coords = eq.geometry.coordinates;
        var mag = eq.properties.mag;
        var place = eq.properties.title || eq.properties.place;
        var marker = L.circleMarker([coords[1], coords[0]],{
            radius: mag*3,
            color: "blue",
            fillOpacity: 0.6
        }).bindPopup(`<b>${place}</b><br>Magnitude: ${mag}`);
        turkeyCluster.addLayer(marker);
    });
    turkeyCluster.addTo(map);
});

// 6️⃣ Fay hatları (JSON olarak repoda olabilir)
fetch("https://dlrzkn.github.io/deprem-takip/DFY_GEO_WGS84_2013_s.json")
.then(res => res.json())
.then(data => {
    fayLayer.addData(data);
    // Başlangıçta açık
    fayLayer.addTo(map);
});

</script>
</body>
</html>
