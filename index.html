<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Türkiye Deprem Haritası</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html, body {
  margin:0;
  padding:0;
  height:100%;
}
#map {
  width:100%;
  height:100%;
}
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// HARITA
var map = L.map('map').setView([39,35],6);

// HARITA TABANI
var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

// BÜYÜKLÜĞE GÖRE RENK
function depremRenk(mag){

if(mag >= 6) return "#ff0000";
if(mag >= 5) return "#ff6600";
if(mag >= 4) return "#ffcc00";
if(mag >= 3) return "#ffff00";
return "#00ff00";

}

// DEPREM KATMANI
var depremLayer = L.layerGroup().addTo(map);

// USGS DEPREM VERİSİ
fetch("https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_day.geojson")
.then(response => response.json())
.then(data => {

data.features.forEach(eq => {

var coords = eq.geometry.coordinates;
var mag = eq.properties.mag;
var place = eq.properties.place;

L.circleMarker([coords[1], coords[0]],{
radius: mag * 3,
color: depremRenk(mag),
fillColor: depremRenk(mag),
fillOpacity:0.8
})
.addTo(depremLayer)
.bindPopup(
"<b>" + place + "</b><br>" +
"Büyüklük: " + mag
);

});

});

// FAY HATLARI KATMANI
var fayLayer = L.geoJSON(null,{
style:{
color:"red",
weight:2
}
}).addTo(map);

// MTA FAY JSON
fetch("DFY_GEO_WGS84_2013_s.json")
.then(res => res.json())
.then(data => {

fayLayer.addData(data);

})
.catch(err => console.log("Fay verisi yüklenemedi"));

// KATMAN KONTROLÜ
var overlayMaps = {
"Depremler": depremLayer,
"Fay Hatları": fayLayer
};

L.control.layers(null, overlayMaps).addTo(map);

</script>

</body>
</html>
