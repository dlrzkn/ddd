<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dünya + Türkiye Deprem Haritası</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
<style>
html, body { margin:0; padding:0; height:100%; width:100%; }
#map { width:100%; height:100%; }
</style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>
// Harita
var map = L.map('map').setView([39, 35], 5);

// OpenStreetMap katmanı
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);

// Cluster grubu
var clusterGroup = L.markerClusterGroup();
map.addLayer(clusterGroup);

// Fay hatları katmanı
var fayLayer = L.geoJSON(null, { style: { color: 'orange', weight: 2 } }).addTo(map);
fetch("DFY_GEO_WGS84_2013_s.json")
.then(res => res.json())
.then(data => fayLayer.addData(data))
.catch(err => console.error("Fay hatları yüklenemedi:", err));

// Renk fonksiyonu
function getColor(mag) {
    return mag > 5 ? '#f03b20' :
           mag > 3 ? '#fd8d3c' :
           mag > 1 ? '#ffffb2' :
                     '#9ecae1';
}

// Depremleri ekleme fonksiyonu
function addEarthquakes(data) {
    // Tarihe göre sırala (yeni → eski)
    data.features.sort((a,b) => (b.properties.time || b.properties.tarih) - (a.properties.time || a.properties.tarih));

    data.features.forEach(eq => {
        var coords = eq.geometry.coordinates;
        var mag = eq.properties.mag;
        var place = eq.properties.place;
        var time = eq.properties.time || eq.properties.tarih || new Date().getTime();

        var circle = L.circleMarker([coords[1], coords[0]], {
            radius: mag*3,
            fillColor: getColor(mag),
            color: '#000',
            weight: 1,
            fillOpacity: 0.7
        }).bindPopup(
            "<b>" + place + "</b><br>Magnitude: " + mag + "<br>Zaman: " + new Date(time).toLocaleString()
        );

        clusterGroup.addLayer(circle);
    });
}

// Dünya depremleri (USGS)
function loadGlobalEarthquakes() {
    fetch("https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_day.geojson")
    .then(res => res.json())
    .then(data => addEarthquakes(data))
    .catch(err => console.error("Dünya depremleri yüklenemedi:", err));
}

// Türkiye depremleri (deprem-takip repo)
function loadTurkeyEarthquakes() {
    fetch("https://raw.githubusercontent.com/dlrzkn/deprem-takip/main/turkiye_canli_depremler.geojson")
    .then(res => res.json())
    .then(data => addEarthquakes(data))
    .catch(err => console.error("Türkiye depremleri yüklenemedi:", err));
}

// İlk yükleme
loadGlobalEarthquakes();
loadTurkeyEarthquakes();

// Her 5 dakikada yenile
setInterval(() => {
    clusterGroup.clearLayers();
    loadGlobalEarthquakes();
    loadTurkeyEarthquakes();
}, 300000);
</script>

</body>
</html>
