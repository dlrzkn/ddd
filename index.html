<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dünya ve Türkiye Deprem Haritası</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>

<style>
html, body { margin:0; padding:0; height:100%; width:100%; }
#map { width:100%; height:100%; }
</style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>
// Map
var map = L.map('map').setView([39,35], 4);

// OSM tile layer
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    maxZoom:19
}).addTo(map);

// Cluster grubu
var depremCluster = L.markerClusterGroup();
map.addLayer(depremCluster);

// Büyüklüğe göre renk
function depremRenk(mag){
    if(mag < 3) return "#ffffb2";
    else if(mag < 5) return "#fd8d3c";
    else return "#f03b20";
}

// USGS dünya depremleri (son 24 saat)
fetch("https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_day.geojson")
.then(res => res.json())
.then(data => animateDepremler(data));

// Türkiye AFAD canlı depremleri
// AFAD JSON feed: son 7 gün
fetch("https://deprem.afad.gov.tr/last-earthquakes.json") // AFAD güncel JSON URL
.then(res => res.json())
.then(data => {
    data.forEach(eq => {
        let lat = eq.latitude;
        let lng = eq.longitude;
        let mag = eq.magnitude;
        let place = eq.locationName;
        let marker = L.circleMarker([lat, lng], {
            radius: mag*3,
            color: depremRenk(mag),
            fillColor: depremRenk(mag),
            fillOpacity: 0.7
        }).bindPopup("<b>"+place+"</b><br>Büyüklük: "+mag);
        depremCluster.addLayer(marker);
    });
});

// Animasyonlu deprem ekleme (USGS)
function animateDepremler(data){
    let sorted = data.features.sort((a,b)=> b.properties.time - a.properties.time);
    let index = 0;
    function addNext(){
        if(index >= sorted.length) return;
        let eq = sorted[index];
        let coords = eq.geometry.coordinates;
        let props = eq.properties;
        let marker = L.circleMarker([coords[1], coords[0]], {
            radius: props.mag*3,
            color: depremRenk(props.mag),
            fillColor: depremRenk(props.mag),
            fillOpacity: 0.7
        }).bindPopup("<b>"+props.place+"</b><br>Büyüklük: "+props.mag);
        depremCluster.addLayer(marker);
        index++;
        setTimeout(addNext, 50);
    }
    addNext();
}

// Layer kontrolü (istediğin zaman aç/kapa)
var overlays = {
    "Depremler": depremCluster
};
L.control.layers(null, overlays).addTo(map);

</script>
</body>
</html>
